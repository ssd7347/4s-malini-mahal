# PostgreSQL connection settings.
# These can be overridden at runtime by the environment variables
# DB_URL, DB_USER, DB_PASSWORD (preferred for deployment so the password
# is not stored in this file).
#
# Create the database first (in psql):
#   CREATE DATABASE malinimahal;

db.url=jdbc:postgresql://localhost:5432/malinimahal
db.user=postgres
db.password=CHANGE_ME
